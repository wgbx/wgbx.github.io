<h2 id="封装思路"><a href="#封装思路" class="headerlink" title="封装思路"></a>封装思路</h2><figure class="highlight js"><table><tr><td class="code"><pre><span class="line"><span class="keyword">const</span> STORAGE_KEY = <span class="string">"mall"</span>;</span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">Storage</span> </span>&#123;</span><br><span class="line">  setItem(key, valueJson, value) &#123;</span><br><span class="line">    <span class="keyword">if</span> (valueJson) &#123;</span><br><span class="line">      <span class="keyword">const</span> val = <span class="keyword">this</span>.getStorage(valueJson);</span><br><span class="line">      val[key] = value;</span><br><span class="line">      <span class="keyword">this</span>.setItem(valueJson, val);</span><br><span class="line">    &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">      <span class="keyword">const</span> val = <span class="keyword">this</span>.getStorage();</span><br><span class="line">      val[key] = value;</span><br><span class="line">      <span class="built_in">window</span>.sessionStorage.setItem(STORAGE_KEY, <span class="built_in">JSON</span>.stringify(val));</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;</span><br><span class="line">  getItem(key, valueJson) &#123;</span><br><span class="line">    <span class="keyword">if</span> (valueJson) &#123;</span><br><span class="line">      <span class="keyword">const</span> val = <span class="keyword">this</span>.getItem(valueJson);</span><br><span class="line">      <span class="keyword">if</span> (val) <span class="keyword">return</span> val[key];</span><br><span class="line">    &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">      <span class="keyword">return</span> <span class="keyword">this</span>.getStorage()[key];</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;</span><br><span class="line">  getStorage() &#123;</span><br><span class="line">    <span class="keyword">return</span> <span class="built_in">JSON</span>.parse(<span class="built_in">window</span>.sessionStorage.getItem(<span class="string">"STORAGE_KEY"</span>) || <span class="string">"&#123;&#125;"</span>);</span><br><span class="line">  &#125;</span><br><span class="line">  clear(key, valueJson) &#123;</span><br><span class="line">    <span class="keyword">const</span> val = <span class="keyword">this</span>.getStorage();</span><br><span class="line">    <span class="keyword">if</span> (valueJson) &#123;</span><br><span class="line">      <span class="keyword">delete</span> val[valueJson][key];</span><br><span class="line">    &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">      <span class="keyword">delete</span> val[key];</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="built_in">window</span>.sessionStorage.setItem(STORAGE_KEY, <span class="built_in">JSON</span>.stringify(val));</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">export</span> <span class="keyword">default</span> Storage;</span><br></pre></td></tr></table></figure>
